<!DOCTYPE html>
<html>
<head>
    <title>EEG Drift Detection Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin: 15px;
            width: 90%;
            max-width: 1000px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        input, button {
            padding: 10px;
            margin: 10px;
            background: #334155;
            color: white;
            border: none;
            border-radius: 6px;
        }

        button {
            background: #38bdf8;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        canvas {
            background: white;
            border-radius: 10px;
        }

        .info {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .info-box {
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            margin: 10px;
            width: 200px;
            text-align: center;
        }

        .highlight {
            color: #38bdf8;
            font-size: 22px;
        }
    </style>
</head>

<body>

<h1>EEG Drift Detection Dashboard</h1>

<div class="container">

    <div class="card">
        <input type="file" id="fileInput" />

        <br>

        <label>Threshold: <span id="thresholdDisplay">300</span></label>
        <input type="range" id="thresholdSlider" min="100" max="1000" value="300">

        <br>

        <button onclick="downloadChart()">Download Graph</button>
        <button onclick="resetZoom()">Reset Zoom</button>
    </div>

    <div class="card">
        <canvas id="myChart"></canvas>
    </div>

    <div class="card">
        <canvas id="miniChart"></canvas>
    </div>

    <div class="card info">
        <div class="info-box">
            <div class="highlight" id="totalSignals">0</div>
            <p>Total Signals</p>
        </div>

        <div class="info-box">
            <div class="highlight" id="driftCount">0</div>
            <p>Drift Events</p>
        </div>

        <div class="info-box">
            <div class="highlight" id="thresholdVal">300</div>
            <p>Threshold</p>
        </div>
    </div>

    <div class="card">
        <h3>Explanation</h3>
        <p id="explanation"></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
